{% extends "core/base.html" %}
{% block title %}{{ accion }} Correo{% endblock %}
{% block content %}
<div class="page-header">
  <h1>📧 {{ accion }} Correo</h1>
  <a href="{% url 'lista_correos' %}" class="btn">← Volver</a>
</div>
<div class="card" style="max-width:700px;margin:0 auto">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Cliente *</label>
        <input type="text" name="cliente" class="form-control" required value="{{ correo.cliente|default:'' }}" placeholder="Nombre del cliente o número de caso">
      </div>
      <div class="form-group">
        <label>Fecha de Recibido *</label>
        <input type="date" name="fecha_recibido" class="form-control" required value="{{ correo.fecha_recibido|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Asunto *</label>
      <input type="text" name="asunto" class="form-control" required value="{{ correo.asunto|default:'' }}" placeholder="Asunto del correo">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Responsable</label>
        <input type="text" name="responsable" class="form-control" 
          value="{{ correo.responsable|default:'' }}" 
          placeholder="Ej: C1, C2, Juan Pérez…">
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select name="estado" class="form-control">
          {% for val, label in estados %}
          <option value="{{ val }}" {% if correo.estado == val %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Observaciones</label>
      <textarea name="observaciones" class="form-control" rows="3" placeholder="Observaciones adicionales…">{{ correo.observaciones|default:'' }}</textarea>
    </div>
    <div style="background:#e0f2fe;border-radius:8px;padding:.8rem;margin-bottom:1rem;font-size:.85rem;color:#0369a1">
      ℹ️ La fecha límite se calculará automáticamente como <strong>8 días hábiles</strong> desde la fecha de recibido.
    </div>
    <div style="display:flex;gap:.5rem">
      <button type="submit" class="btn btn-primary">💾 Guardar</button>
      <a href="{% url 'lista_correos' %}" class="btn">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
