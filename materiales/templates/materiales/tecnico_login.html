<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Técnico</title>
{% load static %}
<link rel="stylesheet" href="{% static 'core/css/main.css' %}">
</head>
<body class="login-body">
<div class="login-card">
  <div class="login-logo">📦</div>
  <h1>Solicitud de Materiales</h1>
  <p class="login-sub">Ingrese su código de acceso</p>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Código de Cuadrilla</label>
      <input type="text" name="codigo" class="form-control" placeholder="ID UNICO" autofocus required style="font-size:1.3rem;text-align:center;letter-spacing:.3rem">
    </div>
    <button type="submit" class="btn btn-primary btn-block" style="padding:.7rem">Ingresar →</button>
  </form>
</div>
</body>
</html>
