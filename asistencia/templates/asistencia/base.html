<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Sistema de Asistencia{% endblock %}</title>
{% load static %}
<link rel="stylesheet" href="{% static 'asistencia/css/main.css' %}">
</head>
<body>
{% block body %}
<nav class="navbar">
  <div class="nav-brand">📋 Control de Asistencia</div>
  <div class="nav-links">
    {% if user.is_authenticated %}
      <a href="{% url 'asistencia_panel' %}">Dashboard</a>
      <a href="{% url 'lista_asistencia' %}">Asistencia</a>
      <a href="{% url 'gestion_qr' %}">QR</a>
      <a href="{% url 'gestion_tecnicos' %}">Técnicos</a>
      <a href="{% url 'logout' %}" class="btn-logout">Salir</a>
    {% endif %}
  </div>
</nav>
<main class="container">
  {% for message in messages %}
  <div class="alert alert-{{ message.tags }}">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>
{% endblock %}
<script src="{% static 'asistencia/js/main.js' %}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
